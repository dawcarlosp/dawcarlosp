    <tspan id="hl21" visibility="hidden"> </tspan>
    <tspan id="hl22" visibility="hidden">P</tspan>
    <tspan id="hl23" visibility="hidden" dx="-15">.</tspan>
    <tspan id="hcursor" visibility="hidden">|</tspan>

    <animate attributeName="visibility" values="visible" begin="0s" dur="0.1s" fill="freeze" href="#hl1" />
    <animate attributeName="visibility" values="visible" begin="0.15s" dur="0.1s" fill="freeze" href="#hl2" />
