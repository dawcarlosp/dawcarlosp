<svg viewBox="0 0 1200 800" preserveAspectRatio="xMinYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="40%" stop-color="#111133" />
      <stop offset="100%" stop-color="#0a1a2f" />
    </linearGradient>
    <radialGradient id="auroraGradientFooter" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auroraHalo" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#00ffee" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00ffee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auroraGradient" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="deepViolet" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a3a7a" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#0f2555" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0a1a2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deepBlue" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#2550a0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1a2f" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurAurora" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="18" /></filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="25" /></filter>
    <filter id="blurHalo" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="50" /></filter>
    <filter id="softDepth" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="reflectionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd5ce" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#f28482" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#f28482" stop-opacity="0" />
    </linearGradient>
    <filter id="reflectionBlur" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="reflectionGlow" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <linearGradient id="trailGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="trailGradientWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe0e0" stop-opacity="0" />
      <stop offset="40%" stop-color="#ffe0e0" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffe0e0" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a2f" stop-opacity="1" />
      <stop offset="100%" stop-color="#0a1a2f" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#skyGradient)" />
  <rect x="0" y="0" width="1200" height="50" fill="url(#topFade)" />

  <g>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" begin="0s" repeatCount="indefinite"/>
    <circle cx="100" cy="330" r="1.1" fill="#ffffff"/>
    <circle cx="600" cy="370" r="1.3" fill="#e0e0ff"/>
    <circle cx="400" cy="480" r="1.0" fill="#ffe0e0"/>
    <circle cx="1100" cy="520" r="1.2" fill="#fffacd"/>
    <circle cx="200" cy="560" r="0.9" fill="#f0f8ff"/>
  </g>
  <g>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
    <circle cx="300" cy="350" r="1.2" fill="#fffacd"/>
    <circle cx="900" cy="390" r="1.1" fill="#fffacd"/>
    <circle cx="750" cy="460" r="1.0" fill="#ffffff"/>
    <circle cx="150" cy="440" r="0.8" fill="#e0e0ff"/>
    <circle cx="500" cy="540" r="1.1" fill="#ffe0e0"/>
    <circle cx="1050" cy="580" r="0.9" fill="#ffffff"/>
  </g>
  <g>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    <circle cx="850" cy="310" r="0.9" fill="#f0f8ff"/>
    <circle cx="50" cy="500" r="1.0" fill="#fffacd"/>
    <circle cx="950" cy="550" r="0.8" fill="#e0e0ff"/>
    <circle cx="350" cy="610" r="0.9" fill="#f0f8ff"/>
  </g>

  <g filter="url(#blur)">
    <path fill="url(#auroraGradient)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate"
        values="-100 0; 0 0; 100 0; 0 0; -100 0" dur="12s" repeatCount="indefinite" />
      <animate attributeName="d" dur="10s" repeatCount="indefinite"
        values="
          M0,500 Q300,60 600,200 T1200,100 L1200,500 L0,500 Z;
          M0,500 Q300,90 600,150 T1200,120 L1200,500 L0,500 Z;
          M0,500 Q300,50 600,180 T1200,90 L1200,500 L0,500 Z;
          M0,500 Q300,60 600,200 T1200,100 L1200,500 L0,500 Z
        " />
    </path>
  </g>

  <g filter="url(#blur)">
    <path fill="url(#auroraGradient)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="150 0; 0 0; -150 0; 0 0; 150 0" dur="16s" repeatCount="indefinite" />
      <animate attributeName="d" dur="12s" repeatCount="indefinite"
        values="
          M0,450 Q250,100 500,150 Q850,80 1200,130 L1200,450 L0,450 Z;
          M0,450 Q250,130 500,120 Q850,140 1200,160 L1200,450 L0,450 Z;
          M0,450 Q250,70 500,170 Q850,100 1200,140 L1200,450 L0,450 Z;
          M0,450 Q250,100 500,150 Q850,80 1200,130 L1200,450 L0,450 Z
        " />
    </path>
  </g>

  <rect x="0" y="430" width="1200" height="220" fill="url(#auroraGradientFooter)" opacity="0.25" filter="url(#blurAurora)">
    <animate attributeName="opacity" values="0.15;0.30;0.15" dur="6s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#blurHalo)">
    <path fill="url(#auroraHalo)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 100 0; -100 0; 0 0" dur="12s" repeatCount="indefinite" />
      <animate attributeName="d" dur="12s" repeatCount="indefinite"
        values="
          M0,150 Q300,390 600,310 T1200,350 L1200,800 L0,800 Z;
          M0,150 Q300,410 600,330 T1200,320 L1200,800 L0,800 Z;
          M0,150 Q300,350 600,350 T1200,390 L1200,800 L0,800 Z;
          M0,150 Q300,390 600,310 T1200,350 L1200,800 L0,800 Z
        " />
    </path>
  </g>

  <g filter="url(#blurAurora)">
    <path fill="url(#auroraGradientFooter)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 100 0; -100 0; 0 0" dur="8s" repeatCount="indefinite" />
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
        values="
          M0,200 Q300,340 600,310 T1200,340 L1200,800 L0,800 Z;
          M0,200 Q300,380 600,290 T1200,360 L1200,800 L0,800 Z;
          M0,200 Q300,320 600,330 T1200,310 L1200,800 L0,800 Z;
          M0,200 Q300,340 600,310 T1200,340 L1200,800 L0,800 Z
        " />
    </path>
  </g>

  <g>
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="100 -900" to="1300 300"
      dur="3s" begin="0s" repeatCount="indefinite" />
    <g transform="rotate(45)">
      <polygon points="-120,-0.2 0,-2 0,2 -120,0.2" fill="url(#trailGradient)"/>
      <circle cx="0" cy="0" r="10" fill="white" opacity="0.12">
        <animate attributeName="r" values="10;15;10" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="4" fill="white" opacity="0.3">
        <animate attributeName="r" values="4;6;4" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="2.5" fill="white">
        <animate attributeName="r" values="2.5;4;2.5" dur="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g>
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="1100 -900" to="-300 500"
      dur="3.5s" begin="1s" repeatCount="indefinite" />
    <g transform="rotate(135)">
      <polygon points="-100,-0.15 0,-1.5 0,1.5 -100,0.15" fill="url(#trailGradient)"/>
      <circle cx="0" cy="0" r="8" fill="white" opacity="0.12">
        <animate attributeName="r" values="8;12;8" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="3" fill="white" opacity="0.3">
        <animate attributeName="r" values="3;4.5;3" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="2" fill="white">
        <animate attributeName="r" values="2;3;2" dur="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0.8;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="200 -500" to="1000 400"
      dur="5s" begin="2s" repeatCount="indefinite" />
    <g transform="rotate(60)">
      <polygon points="-150,-0.1 0,-1.2 0,1.2 -150,0.1" fill="url(#trailGradientWarm)"/>
      <circle cx="0" cy="0" r="8" fill="#ffe0e0" opacity="0.12">
        <animate attributeName="r" values="8;12;8" dur="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="3" fill="#ffe0e0" opacity="0.3">
        <animate attributeName="r" values="3;4.5;3" dur="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="1.5" fill="#ffe0e0">
        <animate attributeName="r" values="1.5;3;1.5" dur="0.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g>
    <path d="M0,800 L0,570 L50,555 L100,575 L140,550 L200,570 L260,540 L320,565 L380,535 L440,560 L500,545 L560,530 L620,555 L680,520 L740,550 L800,530 L860,545 L920,525 L980,550 L1040,535 L1100,560 L1140,540 L1200,565 L1200,800 Z" fill="#040a18"/>
    <path d="M0,800 L0,590 L40,575 L80,595 L130,560 L180,585 L230,550 L290,580 L350,545 L410,575 L470,540 L530,570 L590,535 L650,565 L710,530 L770,560 L830,540 L890,555 L950,530 L1010,565 L1070,540 L1120,570 L1160,550 L1200,580 L1200,800 Z" fill="#030812"/>
    <path d="M0,800 L0,610 L35,590 L70,615 L120,580 L180,605 L240,570 L300,600 L360,575 L420,595 L480,565 L540,590 L600,560 L660,585 L720,555 L780,580 L840,560 L900,575 L960,555 L1020,585 L1080,560 L1130,590 L1170,575 L1200,595 L1200,800 Z" fill="#02060e"/>
  </g>

  <rect x="0" y="580" width="1200" height="220" fill="#080e20"/>

  <g>
    <ellipse cx="1080" cy="720" rx="60" ry="80" fill="#fcd5ce" opacity="0.15" filter="url(#reflectionGlow)">
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="80;100;80" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="1040" y="600" width="80" height="200" fill="url(#reflectionGradient)" filter="url(#reflectionBlur)" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="width" values="80;100;80" dur="3s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="1080" cy="660" rx="20" ry="35" fill="#fcd5ce" opacity="0.35" filter="url(#reflectionBlur)">
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="35;50;35" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1080" cy="795" rx="25" ry="5" fill="#fcd5ce" opacity="0.25" filter="url(#reflectionBlur)">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g filter="url(#reflectionBlur)" opacity="0.12">
    <path fill="none" stroke="#fcd5ce" stroke-width="4"
          d="M0,610 C100,585 200,625 300,590 C400,555 500,635 600,595 C700,555 800,640 900,600 C1000,565 1100,625 1200,595">
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
               values="M0,610 C100,585 200,625 300,590 C400,555 500,635 600,595 C700,555 800,640 900,600 C1000,565 1100,625 1200,595;
                       M0,595 C120,620 220,580 320,608 C420,570 520,610 620,585 C720,570 820,615 920,590 C1020,575 1120,605 1200,600;
                       M0,610 C100,585 200,625 300,590 C400,555 500,635 600,595 C700,555 800,640 900,600 C1000,565 1100,625 1200,595"/>
    </path>
    <path fill="none" stroke="#fcd5ce" stroke-width="3"
          d="M0,640 C120,610 220,655 350,620 C480,585 580,660 700,625 C820,590 920,650 1050,615">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
               values="M0,640 C120,610 220,655 350,620 C480,585 580,660 700,625 C820,590 920,650 1050,615;
                       M0,625 C140,645 240,600 370,635 C490,600 600,645 720,612 C840,600 940,635 1050,625;
                       M0,640 C120,610 220,655 350,620 C480,585 580,660 700,625 C820,590 920,650 1050,615"/>
    </path>
    <path fill="none" stroke="#fcd5ce" stroke-width="2"
          d="M0,670 C150,640 280,685 420,650 C560,615 680,680 820,645 C960,610 1080,670 1200,640">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
               values="M0,670 C150,640 280,685 420,650 C560,615 680,680 820,645 C960,610 1080,670 1200,640;
                       M0,655 C170,670 300,625 440,660 C570,630 690,660 830,635 C970,620 1090,655 1200,650;
                       M0,670 C150,640 280,685 420,650 C560,615 680,680 820,645 C960,610 1080,670 1200,640"/>
    </path>
  </g>

  <path fill="url(#deepViolet)" filter="url(#softDepth)"
        d="M0,610 C100,585 200,625 300,590 C400,555 500,635 600,595 C700,555 800,640 900,600 C1000,565 1100,625 1200,595 L1200,800 L0,800 Z">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
             values="M0,610 C100,585 200,625 300,590 C400,555 500,635 600,595 C700,555 800,640 900,600 C1000,565 1100,625 1200,595 L1200,800 L0,800 Z;
                     M0,595 C120,620 220,580 320,608 C420,570 520,610 620,585 C720,570 820,615 920,590 C1020,575 1120,605 1200,600 L1200,800 L0,800 Z;
                     M0,610 C100,585 200,625 300,590 C400,555 500,635 600,595 C700,555 800,640 900,600 C1000,565 1100,625 1200,595 L1200,800 L0,800 Z"/>
  </path>
  <path fill="url(#deepBlue)" filter="url(#softDepth)"
        d="M0,640 C120,610 220,655 350,620 C480,585 580,660 700,625 C820,590 920,650 1050,615 L1200,625 L1200,800 L0,800 Z">
    <animate attributeName="d" dur="7s" repeatCount="indefinite"
             values="M0,640 C120,610 220,655 350,620 C480,585 580,660 700,625 C820,590 920,650 1050,615 L1200,625 L1200,800 L0,800 Z;
                     M0,625 C140,645 240,600 370,635 C490,600 600,645 720,612 C840,600 940,635 1050,625 L1200,620 L1200,800 L0,800 Z;
                     M0,640 C120,610 220,655 350,620 C480,585 580,660 700,625 C820,590 920,650 1050,615 L1200,625 L1200,800 L0,800 Z"/>
  </path>
  <path fill="url(#deepViolet)" filter="url(#softDepth)"
        d="M0,670 C150,640 280,685 420,650 C560,615 680,680 820,645 C960,610 1080,670 1200,640 L1200,800 L0,800 Z">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
             values="M0,670 C150,640 280,685 420,650 C560,615 680,680 820,645 C960,610 1080,670 1200,640 L1200,800 L0,800 Z;
                     M0,655 C170,670 300,625 440,660 C570,630 690,660 830,635 C970,620 1090,655 1200,650 L1200,800 L0,800 Z;
                     M0,670 C150,640 280,685 420,650 C560,615 680,680 820,645 C960,610 1080,670 1200,640 L1200,800 L0,800 Z"/>
  </path>
  <path fill="url(#deepBlue)" filter="url(#softDepth)"
        d="M0,710 C180,680 330,730 480,695 C600,665 720,725 880,690 C1000,660 1100,705 1200,680 L1200,800 L0,800 Z">
    <animate attributeName="d" dur="5.5s" repeatCount="indefinite"
             values="M0,710 C180,680 330,730 480,695 C600,665 720,725 880,690 C1000,660 1100,705 1200,680 L1200,800 L0,800 Z;
                     M0,695 C200,715 350,675 500,710 C620,690 740,705 880,680 C1020,670 1120,700 1200,690 L1200,800 L0,800 Z;
                     M0,710 C180,680 330,730 480,695 C600,665 720,725 880,690 C1000,660 1100,705 1200,680 L1200,800 L0,800 Z"/>
  </path>

</svg>
